<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tuner — Hoffner Systems</title>
    <style>
      :root{--bg:#0d140d;--panel:#122012;--line:#2d5a2d;--text:#d9ffd9;--muted:#b2e8b2}
      body{margin:0;font-family:Menlo,Consolas,monospace;background:var(--bg);color:var(--text)}
      .wrap{max-width:900px;margin:0 auto;padding:24px}
      .term{border:1px solid var(--line);background:var(--panel)}
      .top{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--line);color:var(--muted);font-size:12px}
      .body{padding:16px}
      h1{margin:8px 0 12px;line-height:1.2}
      p{color:var(--muted);line-height:1.55}
      a{color:var(--text)}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="term">
        <div class="top"><span>HOFFNER SYSTEMS</span><span>LIVE</span></div>
        <div class="body">
          <p>$ initializing product page...</p>
          <h1>Tuner</h1>
          <p>Domain fine-tuning + local inference on-prem or cloud. Build your moat with domain data.</p>
        </div>
      </section>
    </main>
  </body>
</html>
